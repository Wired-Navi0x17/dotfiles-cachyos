# =============================================================================
# Kitty Configuration v0.47.4
# Optimized for KDE Plasma 6.7 Wayland
# =============================================================================

# -----------------------------------------------------------------------------
# Remote Control
# -----------------------------------------------------------------------------
allow_remote_control yes
listen_on unix:/tmp/kitty

# =============================================================================
# Appearance
# =============================================================================

background_opacity 0.70
background_blur 128

window_padding_width 10
window_margin_width 6

# --- The Beautiful Border Setup ---
window_border_width 2.5pt
draw_minimal_borders no
hide_window_decorations yes  # <--- THIS completely deletes the close/minimize title bar!

# Purplish Pink Borders (Lain Theme)
active_border_color #c084fc    # Glowing purplish pink when active
inactive_border_color #3b1f4a  # Dark muted purple when unfocused
# ----------------------------------

inactive_text_alpha 0.80
dim_opacity 0.90

remember_window_size yes
initial_window_width 120c
initial_window_height 34c

# =============================================================================
# Performance
# =============================================================================

sync_to_monitor yes
repaint_delay 8
input_delay 0

# =============================================================================
# Font
# =============================================================================

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto

font_size 12

disable_ligatures never

# =============================================================================
# Cursor
# =============================================================================

cursor_shape beam
cursor_beam_thickness 2

cursor_blink_interval 0.5
cursor_stop_blinking_after 0

cursor_trail 3
cursor_trail_decay 0.1 0.4

# =============================================================================
# Terminal
# =============================================================================

shell_integration enabled

copy_on_select yes
clipboard_control write-clipboard write-primary

confirm_os_window_close 0
enable_audio_bell no
visual_bell_duration 0

mouse_hide_wait 1.0

# =============================================================================
# URLs / Hyperlinks
# =============================================================================

allow_hyperlinks yes
detect_urls yes

url_style curly
open_url_with default

url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# =============================================================================
# Tab Bar
# =============================================================================

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

tab_title_template "{index}: {title}"
active_tab_title_template "[{index}: {title}]"

active_tab_font_style bold
inactive_tab_font_style normal

tab_fade 0.25 0.5 0.75 1

tab_bar_margin_width 1
tab_bar_margin_height 1 1

# =============================================================================
# Layouts
# =============================================================================

enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical

# =============================================================================
# Mouse
# =============================================================================

mouse_map left click ungrabbed mouse_click_url_or_select
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map left triplepress ungrabbed mouse_selection line
mouse_map middle press ungrabbed paste_from_selection

# =============================================================================
# KEYBINDINGS
# =============================================================================

############
# TABS
############

map ctrl+t new_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

map ctrl+shift+page_up move_tab_backward
map ctrl+shift+page_down move_tab_forward

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

############
# SPLITS
############

map ctrl+enter launch --cwd=current --location=hsplit
map ctrl+shift+enter launch --cwd=current --location=vsplit

############
# CLOSE SPLIT
############

map ctrl+w close_window

############
# NAVIGATE SPLITS
############

map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

############
# MOVE SPLITS
############

map alt+shift+left move_window left
map alt+shift+right move_window right
map alt+shift+up move_window up
map alt+shift+down move_window down

############
# RESIZE SPLITS
############

map ctrl+alt+left resize_window narrower
map ctrl+alt+right resize_window wider
map ctrl+alt+up resize_window taller
map ctrl+alt+down resize_window shorter
map ctrl+alt+0 resize_window reset

############
# LAYOUTS
############

map ctrl+shift+f next_layout
map ctrl+shift+d previous_layout

map ctrl+shift+space toggle_layout stack
map ctrl+alt+space layout_action rotate

############
# FULLSCREEN
############

map f11 toggle_fullscreen

############
# CLIPBOARD
############

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Modern Unified Shortcuts
map ctrl+v       paste_from_clipboard
map meta+v       paste_from_clipboard
map ctrl+c       copy_and_clear_or_interrupt

############
# SCROLLBACK
############

map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

############
# URLS
############

map ctrl+shift+u open_url_with_hints

############
# UTILITIES
############

map ctrl+alt+r load_config_file

map ctrl+shift+b kitten broadcast

map ctrl+shift+o open_selected_path

map ctrl+shift+escape kitty_shell window

map ctrl+shift+delete clear_terminal reset active

map ctrl+shift+i kitten unicode_input

############
# FONT SIZE
############

map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# =============================================================================
# Theme
# =============================================================================


# BEGIN_KITTY_THEME
# Lain Wired
include current-theme.conf
# END_KITTY_THEME